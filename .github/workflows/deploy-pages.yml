name: Deploy to GitHub Pages

# This repo is retired (KLI-15): kliqboost ships from chrisdemonxxx/kliqboost-ai
# to https://kliqboost-app.vercel.app.
#
# This workflow used to publish a static export of this app. That export has been
# impossible since the app adopted Server Actions ("Server Actions are not supported
# with static export"), so the Pages URL sat frozen serving an old scaffold whose
# landing page has no working signup — a dead end at a public, shareable URL.
#
# It now publishes a single redirect page to the canonical app. There is no Next
# build left to break. Reverting this file restores the old (already broken) export.
on:
  workflow_dispatch:

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CANONICAL_APP_URL: https://kliqboost-app.vercel.app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build redirect site
        run: |
          mkdir -p out
          cat > out/index.html <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>kliqboost has moved</title>
              <meta name="robots" content="noindex" />
              <link rel="canonical" href="${CANONICAL_APP_URL}/" />
              <meta http-equiv="refresh" content="0; url=${CANONICAL_APP_URL}/" />
            </head>
            <body>
              <p>kliqboost has moved to <a href="${CANONICAL_APP_URL}/">${CANONICAL_APP_URL}</a>.</p>
              <script>
                window.location.replace("${CANONICAL_APP_URL}/");
              </script>
            </body>
          </html>
          HTML
          # Pages serves 404.html for unknown paths, so deep links redirect too.
          cp out/index.html out/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

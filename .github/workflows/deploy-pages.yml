name: Deploy to GitHub Pages

# Manual-only. The app now uses Next.js Server Actions (brand-profile CRUD,
# AI generation) and server-side auth, which are incompatible with a static
# export ("Server Actions are not supported with static export") — so this
# workflow fails on every push to main. Production deploys go to Vercel
# (see deploy.yml). Kept as workflow_dispatch for anyone experimenting with a
# static marketing mirror; recommend full removal as a follow-up.
on:
  workflow_dispatch:

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          STATIC_EXPORT: "1"
          # Project Pages site is served from https://<owner>.github.io/<repo>/
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
